<!-- AUTO NUMBERING -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const links =
    document.querySelectorAll(".blog-list li a");

  links.forEach((link, index) => {

    if (!/^\d+\.\s/.test(link.textContent)) {

      link.textContent =
        (index + 1) +
        ". " +
        link.textContent.trim();

    }

  });

});
</script>
