<!-- 💬 Direct Visible Live Chat -->
<noscript>
  <p style="text-align:center; font-size:0.95rem; padding:1rem;">
    Contact our support team at
    <a href="mailto:info@engg-tech.com" style="color:#007bff;">info@engg-tech.com</a>
    if chat is unavailable.
  </p>
</noscript>

<!-- 💬 Chat Box -->
<div id="liveChatPopup" role="dialog" aria-label="Live chat support popup" style="display:flex; position:fixed; z-index:10000; top:0; left:0; width:100%; height:100%; background:transparent; align-items:center; justify-content:center;">
  
  <div id="chatBox" style="background:#fff; padding:20px; border-radius:0px; max-width:400px; width:90%; font-family:sans-serif; position:relative;">

    <h3 id="greeting" style="margin-top:0; color:#d11a2a; text-align:center;">
  Hello!
</h3>

    <div style="padding:14px 18px; background:#fff; color:#000; font-weight:bold; font-size:1rem; line-height:1.5; text-align:center;">
            <span style="font-weight:normal; font-size:0.95rem;">
              Need urgent assistance? Email us directly at
              <a href="mailto:info@engg-tech.com" style="color:#000; text-decoration:underline;">info@engg-tech.com</a>
            </span>
            <p id="form-status" role="status" aria-live="polite" style="text-align:center; font-weight:bold; margin-top:0.75rem; margin-bottom:0;"></p>
          </div>

    <input type="text" id="chatHoneypot" style="display:none;" autocomplete="off">

    <input
      type="text"
      id="chatName"
      placeholder="Your Name"
      style="width:100%; padding:8px; margin-bottom:8px; border:1px solid #ccc; border-radius:6px;"
    >

    <input
      type="email"
      id="chatEmail"
      placeholder="Your Email"
      style="width:100%; padding:8px; margin-bottom:8px; border:1px solid #ccc; border-radius:6px;"
    >

    <textarea
      id="chatMessage"
      placeholder="Your Enquiry"
      style="width:100%; height:80px; padding:8px; border:1px solid #ccc; border-radius:6px; resize:none;"
    ></textarea>

    <div style="margin-top:10px;">
      <label for="chatCaptcha">
        What is <span id="chatCaptchaQ">1 + 1</span>?
      </label>

      <input
  type="number"
  id="chatCaptcha"
  placeholder="Write your answer"
  required
  style="width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:6px;">

    </div>

    <button
  id="chatSendBtn"
  onclick="sendChatMessage()"
  style="margin-top:10px; background:#FF6A00; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-size:1rem; cursor:pointer; width:100%; transition:background 0.3s ease;"
  onmouseover="this.style.background='#0A2540'"
  onmouseout="this.style.background='#FF6A00'"
>
  Send Message
</button>

    <div id="cooldownMsg" style="margin-top:10px; font-size:0.9rem; color:#c00; display:none;"></div>

    <div id="chatResponse" style="margin-top:20px; font-size:0.95rem; color:#333;"></div>

  </div>
</div>

<!-- 💬 Script -->
<script data-exec>
let correctAnswer, x, y, chatFormStart = Date.now();

const cooldownKey = "enggtech_chat_last_submit";

(function initCaptcha() {

  x = Math.floor(Math.random() * 6) + 1;
  y = Math.floor(Math.random() * 6) + 1;

  correctAnswer = x + y;

  document.getElementById("chatCaptchaQ").textContent = `${x} + ${y}`;

})();

function formatTime(ms) {

  const minutes = Math.floor(ms / 60000);
  const seconds = Math.floor((ms % 60000) / 1000);

  return `${minutes}m ${seconds}s`;

}

function checkCooldown() {

  const last = localStorage.getItem(cooldownKey);
  const now = Date.now();

  const btn = document.getElementById("chatSendBtn");
  const msg = document.getElementById("cooldownMsg");

  if (last && now - parseInt(last) < 3600000) {

    const remaining = 3600000 - (now - parseInt(last));

    btn.style.display = "none";

    msg.style.display = "block";

    msg.textContent =
      "⏳ Next submission available in " + formatTime(remaining);

    const timer = setInterval(() => {

      const remainingNow =
        3600000 - (Date.now() - parseInt(last));

      if (remainingNow <= 0) {

        clearInterval(timer);

        msg.style.display = "none";

        btn.style.display = "inline-block";

      } else {

        msg.textContent =
          "⏳ Next submission available in " + formatTime(remainingNow);

      }

    }, 1000);

  }

}

checkCooldown();

function sendChatMessage() {

  const name =
    document.getElementById("chatName").value.trim();

  const email =
    document.getElementById("chatEmail").value.trim();

  const message =
    document.getElementById("chatMessage").value.trim();

  const honeypot =
    document.getElementById("chatHoneypot").value.trim();

  const answer =
    parseInt(document.getElementById("chatCaptcha").value);

  const responseDiv =
    document.getElementById("chatResponse");

  const sendBtn =
    document.getElementById("chatSendBtn");

  if (honeypot !== "") {

    responseDiv.innerHTML =
      "<span style='color:red;'>⚠️ Spam detected. Submission blocked.</span>";

    return;

  }

  const delayCheck = Date.now() - chatFormStart;

  if (delayCheck < 3000) {

    responseDiv.innerHTML =
      "<span style='color:orange;'>⏱️ Please wait a moment before sending your message.</span>";

    return;

  }

  if (answer !== correctAnswer) {

    responseDiv.innerHTML =
      "<span style='color:orange;'>❌ Incorrect answer. Please try again.</span>";

    return;

  }

  if (!name || !email || !message) {

    responseDiv.innerHTML =
      "<span style='color:red;'>Please fill in all fields before sending.</span>";

    return;

  }

  const emailPattern =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailPattern.test(email)) {

    responseDiv.innerHTML =
      "<span style='color:red;'>❌ Please enter a valid email address.</span>";

    return;

  }

  sendBtn.style.display = "none";

  const formData = new FormData();

  formData.append("name", name);
  formData.append("email", email);
  formData.append("message", message);
  formData.append("honeypot", honeypot);
  formData.append("captchaX", x);
  formData.append("captchaY", y);
  formData.append("captchaAnswer", answer);

  localStorage.setItem(
    cooldownKey,
    Date.now().toString()
  );

  const num = "6591294851";

  const waMessage = encodeURIComponent(
    `Hello Engg-Tech,\n\nName: ${name}\nEmail: ${email}\nMessage: ${message}`
  );

  responseDiv.innerHTML = `
    <p>✅ Opening WhatsApp...</p>
    <p>
      If it doesn't open,
      <a href="https://wa.me/${num}?text=${waMessage}" target="_blank">
        <strong>click here</strong>
      </a>
    </p>
  `;

  if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {

    window.location.href =
      `https://wa.me/${num}?text=${waMessage}`;

  } else {

    const win = window.open(
      `https://wa.me/${num}?text=${waMessage}`,
      "_blank"
    );

    if (!win || win.closed || typeof win.closed === 'undefined') {

      window.location.href =
        `https://wa.me/${num}?text=${waMessage}`;

    }

  }

  checkCooldown();

  fetch(
    "https://script.google.com/macros/s/AKfycbwkIbW2EzsoG54Adydc0UwnN34au15dm2vnn3Egfhrq69n8HiEdGUgIJQ0riPGLe5k/exec",
    {
      method: "POST",
      body: formData
    }
  );

}

(function() {

  const h = new Date().getHours();

  let g = "Hello";

  if (h < 12) {
    g = "Good morning";
  } else if (h < 18) {
    g = "Good afternoon";
  } else {
    g = "Good evening";
  }

  document.getElementById("greeting").textContent =
    g + "!";

})();
</script>

<style>
@media (max-width: 480px) {

  #chatBox {
    width: 92% !important;
    padding: 18px !important;
  }

}
</style>
