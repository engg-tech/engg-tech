[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# JS + CSS — always check for fresh version
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Favicons — cache 7 days
[[headers]]
  for = "/assets/favicon/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Images — cache 7 days
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML — always fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/**/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# XML sitemaps — always fresh
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
